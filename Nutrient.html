<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Nutrient Calculator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    background:#f4f8fb;
}
.card{
    border-radius:15px;
}
label{
    font-weight:bold;
    margin-top:10px;
}
footer{
    margin-top:40px;
}

canvas{
    max-width:350px;
    margin:auto;
    display:block;
}
</style>
</head>
<body>
<div class="container-fluid bg-primary text-white p-3">
    <div class="row align-items-center">
        <div class="col-md-4 d-flex align-items-center">
        <img src="https://r3genhealth.com/wp-content/uploads/2024/03/Empowered-Wellness.png" 
        width="55" height="55" class="rounded-circle me-2">
        <h2 class="mb-0">MediBridge Healthcare</h2>
</div>
        <div class="col-md-8 text-end">
            <a href="index.html" class="btn btn-dark">Back to Dashboard</a>
        </div>
    </div>
</div>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">Daily Nutrient Calculator</h2>
        <label>Age</label>
        <input type="number" id="age" class="form-control" placeholder="Enter Age">

        <label>Height (Feet)</label>
        <input type="number" id="feet" class="form-control" placeholder="Feet">

        <label>Height (Inches)</label>
        <input type="number" id="inches" class="form-control" placeholder="Inches">

        <label>Weight (kg)</label>
        <input type="number" id="weight" class="form-control" placeholder="Weight">

        <label>Gender</label>
        <select id="gender" class="form-select">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Activity Level</label>
        <select id="activity" class="form-select">
        <option value="">Select Activity</option>
        <option>Sedentary</option>
        <option>Light</option>
        <option>Moderate</option>
        <option>Active</option>
        </select><br>

        <button class="btn btn-success w-100" onclick="calculate()">Calculate</button>
        <p id="error" class="text-danger mt-3"></p>

        <div id="result" style="display:none;">
        <hr>
            <p><b>BMI :</b> <span id="bmi"></span></p>
            <p><b>Category :</b> <span id="category"></span></p>
            <p><b>BMR :</b> <span id="bmr"></span></p>
            <p><b>Calories :</b> <span id="calories"></span></p>
            <p><b>Protein :</b> <span id="protein"></span></p>
            <p><b>Carbohydrates :</b> <span id="carbs"></span></p>
            <p><b>Fat :</b> <span id="fat"></span></p>
            <canvas id="pieChart"></canvas>
        </div>
</div>
</div>
<script>
let chart;
function calculate() {
    document.getElementById("error").innerHTML = "";

    let age = Number(document.getElementById("age").value);
    let feet = Number(document.getElementById("feet").value);
    let inches = Number(document.getElementById("inches").value);
    let weight = Number(document.getElementById("weight").value);
    let gender = document.getElementById("gender").value;
    let activity = document.getElementById("activity").value;

    if (age < 5 || age > 100) {
        document.getElementById("error").innerHTML = "Enter a valid age.";
        return;
    }
    if (feet < 1 || feet > 8) {
        document.getElementById("error").innerHTML = "Enter a valid height in feet.";
        return;
    }
    if (inches < 0 || inches > 11) {
        document.getElementById("error").innerHTML = "Inches must be between 0 and 11.";
        return;
    }
    if (weight < 15 || weight > 200) {
        document.getElementById("error").innerHTML = "Enter a valid weight.";
        return;
    }
    if (gender == "" || activity == "") {
        document.getElementById("error").innerHTML = "Please fill all fields.";
        return;
    }

    let totalInches = feet * 12 + inches;
    let heightMeter = totalInches * 0.0254;
    let bmi = weight / (heightMeter * heightMeter);
    let category = "";

    if (bmi < 18.5)
        category = "Underweight";
    else if (bmi < 25)
        category = "Normal";
    else if (bmi < 30)
        category = "Overweight";
    else
        category = "Obese";

    let bmr;
    if (gender == "Male")
        bmr = (10 * weight) + (6.25 * heightMeter * 100) - (5 * age) + 5;
    else
        bmr = (10 * weight) + (6.25 * heightMeter * 100) - (5 * age) - 161;

    let calories;
    if (activity == "Sedentary")
        calories = bmr * 1.2;
    else if (activity == "Light")
        calories = bmr * 1.375;
    else if (activity == "Moderate")
        calories = bmr * 1.55;
    else
        calories = bmr * 1.725;

    let protein = (calories * 0.20) / 4;
    let carbs = (calories * 0.50) / 4;
    let fat = (calories * 0.30) / 9;
    document.getElementById("result").style.display = "block";

    document.getElementById("bmi").innerHTML = bmi.toFixed(2);
    document.getElementById("category").innerHTML = category;
    document.getElementById("bmr").innerHTML = bmr.toFixed(2);
    document.getElementById("calories").innerHTML = calories.toFixed(2);
    document.getElementById("protein").innerHTML = protein.toFixed(2) + " g";
    document.getElementById("carbs").innerHTML = carbs.toFixed(2) + " g";
    document.getElementById("fat").innerHTML = fat.toFixed(2) + " g";

    if (chart) {
        chart.destroy();
    }
    let ctx = document.getElementById("pieChart").getContext("2d");
    chart = new Chart(ctx, {
        type: "pie",
        data: {
            labels: ["Protein", "Carbohydrates", "Fat"],
            datasets: [{
                label: "Daily Nutrients",
                data: [protein, carbs, fat],
                backgroundColor: [
                    "#36A2EB",
                    "#4BC0C0",
                    "#FF6384"
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                title: {
                    display: true,
                    text: "Daily Nutrient Distribution"
                },
                legend: {
                    position: "bottom"
                }
            }
        }
    });
}
</script>
<footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">© 2026 MediBridge | Stay Healthy, Stay Safe</p>
    <p class="mb-0">Image Credits: K+31 Clinic & Wellness (k31.ru), Freepik.</p>
</footer>
</body>
</html>
